name: DailyMarketCheck
on:
  schedule:
    - cron: '30 11 * * 1-5'
    - cron: '30 13 * * 6'
    - cron: '* 13-20 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic feedparser requests
      - env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python pipeline.py
      - run: python prices.py 2>/dev/null || true
      - run: |
          git config user.name "DailyMarketCheck Bot"
          git config user.email "bot@dailymarketcheck.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Market update $(date -u +'%Y-%m-%d %H:%M UTC')" && git push
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python prices.py
      - run: |
          git config user.name "Bot"
          git config user.email "bot@dailymarketcheck.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Update prices" && git push
