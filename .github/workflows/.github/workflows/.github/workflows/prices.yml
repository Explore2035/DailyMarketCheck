name: Update Prices
on:
  schedule:
    - cron: '* 13-20 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python prices.py
      - run: |
          git config user.name "Bot"
          git config user.email "bot@dailymarketcheck.com"
          git add index.html
          git diff --cached --quiet || git commit -m "💹 $(date -u +'%H:%M UTC')" && git push
